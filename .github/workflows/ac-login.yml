name: AC - Login Test

on:
  workflow_dispatch:

jobs:
  ac-login-test:
    runs-on: ubuntu-latest

    steps:
      - name: Login to ActiveControl
        id: ac_login
        shell: bash
        env:
          AC_BASE_URL: ${{ vars.AC_BASE_URL }}
          AC_LOGIN_ENDPOINT: ${{ vars.AC_LOGIN_ENDPOINT }}
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          set -euo pipefail

          echo "Logging in to ActiveControl..."
          echo "AC_BASE_URL=$AC_BASE_URL"

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "$AC_BASE_URL$AC_LOGIN_ENDPOINT" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"$AC_USERNAME\",
              \"password\": \"$AC_PASSWORD\"
            }")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "HTTP Status: $STATUS"

          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "❌ ActiveControl login failed"
            echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')

          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "❌ No access_token found in ActiveControl response"
            echo "$BODY"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

          SYSTEM_ID=$(echo "$BODY" | jq -r '.systemId // empty')
          SYSTEM_NAME=$(echo "$BODY" | jq -r '.systemName // empty')

          echo "✅ ActiveControl login successful"
          echo "System ID: $SYSTEM_ID"
          echo "System Name: $SYSTEM_NAME"

      - name: Summary
        run: |
          echo "## ActiveControl Login Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Login successful" >> "$GITHUB_STEP_SUMMARY"
