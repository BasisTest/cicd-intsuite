name: AC Callback Deploy

on:
  repository_dispatch:
    types: [ac-import-success]

permissions:
  contents: read

jobs:
  validate-callback:
    name: Validate ActiveControl Callback
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    outputs:
      package_id: ${{ steps.validate.outputs.package_id }}
      target_env: ${{ steps.validate.outputs.target_env }}
      git_commit: ${{ steps.validate.outputs.git_commit }}
      ac_task_id: ${{ steps.validate.outputs.ac_task_id }}
    steps:
      - name: Validate payload
        id: validate
        shell: bash
        env:
          EXPECTED_SECRET: ${{ secrets.AC_SHARED_SECRET }}
          PAYLOAD_SECRET: ${{ github.event.client_payload.secret }}
          PACKAGE_ID: ${{ github.event.client_payload.package_id }}
          TARGET_ENV: ${{ github.event.client_payload.target_env }}
          GIT_COMMIT: ${{ github.event.client_payload.git_commit }}
          AC_TASK_ID: ${{ github.event.client_payload.ac_task_id }}
        run: |
          set -euo pipefail

          echo "Validating ActiveControl callback..."

          if [[ -z "$EXPECTED_SECRET" ]]; then
            echo "❌ AC_SHARED_SECRET is not configured"
            exit 1
          fi

          if [[ "$PAYLOAD_SECRET" != "$EXPECTED_SECRET" ]]; then
            echo "❌ Invalid callback secret"
            exit 1
          fi

          if [[ -z "$PACKAGE_ID" ]]; then
            echo "❌ package_id missing from client_payload"
            exit 1
          fi

          if [[ -z "$TARGET_ENV" ]]; then
            echo "❌ target_env missing from client_payload"
            exit 1
          fi

          if [[ -z "$GIT_COMMIT" ]]; then
            echo "❌ git_commit missing from client_payload"
            exit 1
          fi

          if [[ "$TARGET_ENV" != "TST" ]]; then
            echo "❌ For phase 3 only TST is allowed. Received: $TARGET_ENV"
            exit 1
          fi

          echo "✅ Callback validated"
          echo "Package ID : $PACKAGE_ID"
          echo "Target env : $TARGET_ENV"
          echo "Git commit : $GIT_COMMIT"
          echo "AC task ID : ${AC_TASK_ID:-n/a}"

          echo "package_id=$PACKAGE_ID" >> "$GITHUB_OUTPUT"
          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "git_commit=$GIT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "ac_task_id=$AC_TASK_ID" >> "$GITHUB_OUTPUT"

  read-env-vars-tst:
    needs: [validate-callback]
    name: Read Environment Variables for TST
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: TST
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
      btp-eic-runtimes: ${{ steps.export.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ steps.export.outputs.btp-eic-url-template }}
    steps:
      - name: Export vars
        id: export
        shell: bash
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> "$GITHUB_OUTPUT"
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> "$GITHUB_OUTPUT"
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> "$GITHUB_OUTPUT"
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> "$GITHUB_OUTPUT"
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> "$GITHUB_OUTPUT"
          echo "btp-eic-runtimes=${{ vars.BTP_EIC_RUNTIMES }}" >> "$GITHUB_OUTPUT"
          echo "btp-eic-url-template=${{ vars.BTP_EIC_URL_TEMPLATE }}" >> "$GITHUB_OUTPUT"

  deploy-to-tst:
    needs: [validate-callback, read-env-vars-tst]
    name: Deploy to TST from AC-approved commit
    uses: BasisTest/cicd-actions-for-sap-integration-suite/.github/workflows/delete-upload.yml@v1.3.0-artifact-v4-patch
    with:
      workflow-ref: v1.3.0-artifact-v4-patch
      target-env: TST
      source-ref: ${{ needs.validate-callback.outputs.git_commit }}
      integrationpackages-upload-ids: ${{ needs.validate-callback.outputs.package_id }}
      partnerdirectory-upload-ids: ""
      btp-api-user: ${{ needs.read-env-vars-tst.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.read-env-vars-tst.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.read-env-vars-tst.outputs.btp-token-url }}
      btp-api-url: ${{ needs.read-env-vars-tst.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.read-env-vars-tst.outputs.git-cicd-orgrepo }}
      enable-set-log-level: ${{ vars.BTP_SET_LOG_LEVEL != 'false' }}
      btp-eic-runtimes: ${{ needs.read-env-vars-tst.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ needs.read-env-vars-tst.outputs.btp-eic-url-template }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
