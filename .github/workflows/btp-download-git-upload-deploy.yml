# Version History:
# 1.0.0 - 2025-11-24 - Initial release (O. Weng)
# 1.0.1 - 2026-01-29 - Introduce environment variable RUNS_ON (O.Weng)
# 1.0.2 - 2026-02-26 - Remove output of secrets (O.Weng)
# 1.1.0 - 2026-05-12 - Add GitHub App authentication support (O.Weng)
# 1.2.0 - 2026-05-19 - Pass enable-set-log-level from BTP_SET_LOG_LEVEL variable (O. Weng)
# 1.3.0 - 2026-05-20 - Pass BTP_EIC_RUNTIMES and BTP_EIC_URL_TEMPLATE; merge initialize job; fix EIC vars read from TST environment via job output (O.Weng)
# 1.6.0 - 2026-05-21 - Split single GitHub App into CICD reader (GIT_CICD_APP_ID) and consumer bot (GIT_GITHUB_APP_ID); remove GIT_GITHUB_APP_PRIVATE_KEY from reference workflow passthroughs (O.Weng)
# 1.6.1 - 2026-07-01 - ActiveControl Business Task integration.
#                       DEV CPI -> Git -> AC BT -> Pending Registry.
#                       Direct TST deploy disabled until AC polling/approval.
#                       (A. Yildirim / BasisTest)
# 1.6.2 - 2026-07-03 - Dedup-Schutz: BT wird nur erstellt wenn development-HEAD
#                       sich durch den Download tatsaechlich geaendert hat
#                       (SHA-Vergleich vor/nach Download, kein Fork-Patch noetig).
#                       (A. Yildirim / BasisTest)

name: (Dev) BTP Download to GIT and Upload/Deploy to TST

on:
  workflow_dispatch:
    inputs:
      id:
        description: "ID"
        required: true
        type: string
      mode:
        description: "Mode IntegrationPackages/PartnerDirectory"
        required: true
        type: choice
        options:
          - IntegrationPackages
          - PartnerDirectory
      commit-message:
        description: "JIRA Story / SNOW Incident"
        required: true
        type: string

permissions:
  contents: write

jobs:
  initialize:
    name: Authorize & Read Environment Variables for DEV
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: DEV
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: ${{ vars.GIT_GITHUB_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GIT_GITHUB_APP_PRIVATE_KEY }}

      - name: Resolve org token
        id: org-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_ORG_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No org token: set GIT_GITHUB_APP_ID + GIT_GITHUB_APP_PRIVATE_KEY, or set GIT_ORG_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Check team authorization
        uses: BasisTest/cicd-actions-for-sap-integration-suite/.github/actions/check-team-authorization@v1.3.0-artifact-v4-patch
        with:
          team-slug: ${{ vars.BTP_DEV_TEAM_SLUG }}
          github-token: ${{ steps.org-token.outputs.token }}

      - name: Export vars
        id: export
        shell: bash
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

  # ── NEU: development-HEAD VOR dem Download festhalten ───────────────────────
  # Laeuft parallel zu initialize, braucht keine BTP-Auth - nur ein Checkout.
  # Muss abgeschlossen sein, bevor btp-download-btp startet (siehe dessen needs).
  resolve-development-commit-before:
    name: Resolve Development Commit (before download)
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    outputs:
      git_commit_before: ${{ steps.resolve.outputs.git_commit }}
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 1

      - name: Resolve commit before download
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(git rev-parse HEAD)
          echo "development HEAD vor Download: $SHA"
          echo "git_commit=$SHA" >> "$GITHUB_OUTPUT"

  btp-download-btp:
    needs: [initialize, resolve-development-commit-before]
    name: Download ${{ inputs.mode }}
    uses: BasisTest/cicd-actions-for-sap-integration-suite/.github/workflows/download-btp-to-git.yml@v1.3.0-artifact-v4-patch
    with:
      workflow-ref: v1.3.0-artifact-v4-patch
      source-env: DEV
      target-ref: development
      ids: ${{ inputs.id }}
      mode: ${{ inputs.mode }}
      commit-message: ${{ inputs.commit-message }}
      btp-api-user: ${{ needs.initialize.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.initialize.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}

  # ── CUSTOM: Resolve Git Commit NACH DEV -> Git Sync (unveraendert) ──────────
  resolve-development-commit:
    needs: [btp-download-btp]
    name: Resolve Development Commit
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    outputs:
      git_commit: ${{ steps.resolve.outputs.git_commit }}
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 1

      - name: Resolve current development commit
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          SHA=$(git rev-parse HEAD)

          echo "Resolved development commit: $SHA"
          echo "git_commit=$SHA" >> "$GITHUB_OUTPUT"

  # ── CUSTOM: Create ActiveControl Business Task ──────────────────────────────
  # NEU: if-Bedingung - nur wenn development-HEAD sich durch den Download
  # tatsaechlich geaendert hat (git-commit im SAP-Framework hat committed).
  # Identisch/before == after -> git-commit hatte "No changes to commit" ->
  # kein neuer Commit -> keine neue BT.
  create-activecontrol-task:
    needs: [resolve-development-commit-before, resolve-development-commit]
    if: needs.resolve-development-commit-before.outputs.git_commit_before != needs.resolve-development-commit.outputs.git_commit
    name: Create ActiveControl Business Task
    uses: ./.github/workflows/ac-create-task-test.yml
    with:
      package_id: ${{ inputs.id }}
      source_env: DEV
      target_env: TST
      git_commit: ${{ needs.resolve-development-commit.outputs.git_commit }}
    secrets: inherit

  # ── CUSTOM: Register GitHub-created BT as Pending (unveraendert) ────────────
  # Wird automatisch mitgeskippt, wenn create-activecontrol-task uebersprungen
  # wurde (Skip-Propagation ueber needs, gleiches Prinzip wie bei
  # read-env-vars-tst / btp-process-id weiter unten).
  register-pending-activecontrol-task:
    needs: [resolve-development-commit, create-activecontrol-task]
    name: Register Pending ActiveControl Task
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Register pending AC task
        shell: bash
        env:
          TASK_ID: ${{ needs.create-activecontrol-task.outputs.task_id }}
          PACKAGE_ID: ${{ inputs.id }}
          SOURCE_ENV: DEV
          TARGET_ENV: TST
          GIT_COMMIT: ${{ needs.resolve-development-commit.outputs.git_commit }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          FILE=".github/ac-pending-activecontrol-tasks.json"

          mkdir -p .github

          if [[ ! -f "$FILE" ]]; then
            echo "[]" > "$FILE"
          fi

          if [[ -z "$TASK_ID" || "$TASK_ID" == "null" ]]; then
            echo "❌ No task_id returned from ActiveControl task creation"
            exit 1
          fi

          TMP_FILE="$(mktemp)"

          jq \
            --arg task_id "$TASK_ID" \
            --arg package_id "$PACKAGE_ID" \
            --arg source_env "$SOURCE_ENV" \
            --arg target_env "$TARGET_ENV" \
            --arg git_commit "$GIT_COMMIT" \
            --arg github_run_id "$GITHUB_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            '
            map(select(.task_id != $task_id)) +
            [{
              task_id: $task_id,
              package_id: $package_id,
              source_env: $source_env,
              target_env: $target_env,
              git_commit: $git_commit,
              github_run_id: $github_run_id,
              repository: $repository
            }]
            ' "$FILE" > "$TMP_FILE"

          mv "$TMP_FILE" "$FILE"

          echo "Pending AC task registry:"
          cat "$FILE" | jq .

      - name: Commit pending task registry
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/ac-pending-activecontrol-tasks.json

          if git diff --cached --quiet; then
            echo "No pending registry changes to commit."
            exit 0
          fi

          git commit -m "chore: register pending ActiveControl task [skip ci]"
          git push

  # ── ORIGINAL TST DEPLOY PATH DISABLED ───────────────────────────────────────
  # Direct TST deploy is disabled for the AC-gated flow.
  # Deployment is now triggered later by:
  #   AC Poll Workflow -> repository_dispatch -> ac-callback-deploy.yml
  read-env-vars-tst:
    if: ${{ false }}
    needs: [register-pending-activecontrol-task]
    name: Read Environment Variables for Test
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: TST
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
      btp-eic-runtimes: ${{ steps.export.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ steps.export.outputs.btp-eic-url-template }}
    steps:
      - name: Export vars
        id: export
        shell: bash
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT
          echo "btp-eic-runtimes=${{ vars.BTP_EIC_RUNTIMES }}" >> $GITHUB_OUTPUT
          echo "btp-eic-url-template=${{ vars.BTP_EIC_URL_TEMPLATE }}" >> $GITHUB_OUTPUT

  # Unchanged original deploy job.
  # It is automatically skipped because read-env-vars-tst is skipped.
  btp-process-id:
    needs: [read-env-vars-tst]
    name: Process ${{ github.event.inputs.mode }}
    uses: BasisTest/cicd-actions-for-sap-integration-suite/.github/workflows/delete-upload.yml@v1.3.0-artifact-v4-patch
    with:
      workflow-ref: v1.3.0-artifact-v4-patch
      target-env: TST
      source-ref: development
      integrationpackages-upload-ids: ${{ github.event.inputs.mode == 'IntegrationPackages' && github.event.inputs.id || '' }}
      partnerdirectory-upload-ids: ${{ github.event.inputs.mode == 'PartnerDirectory' && github.event.inputs.id || '' }}
      btp-api-user: ${{ needs.read-env-vars-tst.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.read-env-vars-tst.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.read-env-vars-tst.outputs.btp-token-url }}
      btp-api-url: ${{ needs.read-env-vars-tst.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.read-env-vars-tst.outputs.git-cicd-orgrepo }}
      enable-set-log-level: ${{ vars.BTP_SET_LOG_LEVEL != 'false' }}
      btp-eic-runtimes: ${{ needs.read-env-vars-tst.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ needs.read-env-vars-tst.outputs.btp-eic-url-template }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
