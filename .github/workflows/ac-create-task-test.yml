name: AC - Create Business Task Test

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: "CPI package ID"
        required: true
        type: string
        default: "AY"
      source_env:
        description: "Source environment"
        required: true
        type: string
        default: "DEV"
      target_env:
        description: "Target environment"
        required: true
        type: string
        default: "TST"
      git_commit:
        description: "Git commit SHA to correlate with ActiveControl BT"
        required: false
        type: string
        default: ""
  
  workflow_call:
      inputs:
        package_id:
          required: true
          type: string
        source_env:
          required: true
          type: string
        target_env:
          required: true
          type: string
        git_commit:
          required: true
          type: string
      outputs:
        task_id:
          description: "Created ActiveControl Business Task ID"
          value: ${{ jobs.ac-create-task-test.outputs.task_id }}


jobs:
  ac-create-task-test:
    runs-on: ubuntu-latest
    outputs:
      task_id: ${{ steps.create_task.outputs.task_id }}

    steps:
      - name: Login to ActiveControl
        id: ac_login
        shell: bash
        env:
          AC_BASE_URL: ${{ vars.AC_BASE_URL }}
          AC_LOGIN_ENDPOINT: ${{ vars.AC_LOGIN_ENDPOINT }}
          AC_SYSTEM: ${{ vars.AC_SYSTEM }}
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          set -euo pipefail

          echo "Logging in to ActiveControl..."
          echo "Login URL=$AC_BASE_URL$AC_LOGIN_ENDPOINT"
          echo "AC_SYSTEM=$AC_SYSTEM"

          LOGIN_PAYLOAD=$(jq -n \
            --arg username "$AC_USERNAME" \
            --arg password "$AC_PASSWORD" \
            --arg system "$AC_SYSTEM" \
            '{
              system: $system,
              username: $username,
              password: $password,
              pwIsNotEncoded: true,
              scopes: ["string"],
              sessionDurationInSec: 0
            }')

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "$AC_BASE_URL$AC_LOGIN_ENDPOINT" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "$LOGIN_PAYLOAD")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Login HTTP Status: $STATUS"

          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "❌ ActiveControl login failed"
            echo "$BODY" | jq . || echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')

          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "❌ No access_token found"
            echo "$BODY" | jq . || echo "$BODY"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

          echo "✅ ActiveControl login successful"

      - name: Resolve correlation commit
        id: resolve_commit
        shell: bash
        env:
          INPUT_GIT_COMMIT: ${{ inputs.git_commit }}
          FALLBACK_GIT_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -n "$INPUT_GIT_COMMIT" ]]; then
            GIT_COMMIT="$INPUT_GIT_COMMIT"
            echo "Using provided git_commit input: $GIT_COMMIT"
          else
            GIT_COMMIT="$FALLBACK_GIT_COMMIT"
            echo "No git_commit input provided. Falling back to github.sha: $GIT_COMMIT"
          fi

          echo "git_commit=$GIT_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Create ActiveControl Business Task
        id: create_task
        shell: bash
        env:
          AC_BASE_URL: ${{ vars.AC_BASE_URL }}
          AC_TASK_ENDPOINT: ${{ vars.AC_TASK_ENDPOINT }}
          AC_TOKEN: ${{ steps.ac_login.outputs.token }}

          PACKAGE_ID: ${{ inputs.package_id }}
          SOURCE_ENV: ${{ inputs.source_env }}
          TARGET_ENV: ${{ inputs.target_env }}

          GIT_COMMIT: ${{ steps.resolve_commit.outputs.git_commit }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Creating ActiveControl Business Task..."
          echo "Task URL=$AC_BASE_URL$AC_TASK_ENDPOINT?overrideWarning=false"
          echo "Package    : $PACKAGE_ID"
          echo "Source env : $SOURCE_ENV"
          echo "Target env : $TARGET_ENV"
          echo "Git commit : $GIT_COMMIT"
          echo "Repository : $GITHUB_REPOSITORY"
          echo "Run ID     : $GITHUB_RUN_ID"

          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          REFERENCE="GH-$GITHUB_RUN_ID-$PACKAGE_ID"
          CAPTION="CPI Deploy $PACKAGE_ID to $TARGET_ENV"
          DESCRIPTION="Created from GitHub Actions. Package=$PACKAGE_ID, Source=$SOURCE_ENV, Target=$TARGET_ENV, Commit=$GIT_COMMIT, Repo=$GITHUB_REPOSITORY, RunId=$GITHUB_RUN_ID"

          TASK_PAYLOAD=$(jq -n \
            --arg caption "$CAPTION" \
            --arg reference "$REFERENCE" \
            --arg description "$DESCRIPTION" \
            --arg now "$NOW_UTC" \
            '{
              task: {
                id: "",
                caption: $caption,
                reference: $reference,
                group: {
                  groupId: "",
                  caption: ""
                },
                type: {
                  typeId: "10017111000000199326",
                  caption: "Jira - Story"
                },
                tester: {
                  uname: "AYILDIRIM",
                  fullName: "Alperen Yildirim",
                  initials: "AY"
                },
                priority: {
                  id: "2",
                  caption: "Normal"
                },
                project: {
                  projectId: "10015120400000148142",
                  caption: "BAU - Weekly Release (Week #3)"
                },
                locked: false,
                deploymentStatus: {
                  statusId: "",
                  caption: "",
                  statusIsOverridden: false
                },
                planningStatus: {
                  statusId: "",
                  caption: "",
                  statusIsOverridden: false
                },
                testingStatus: {
                  id: "",
                  caption: ""
                },
                ragStatuses: {
                  statuses: [],
                  objectCount: 0,
                  keyCount: 0
                },
                creationDateTime: $now,
                createdBy: {
                  uname: "AYILDIRIM",
                  fullName: "Alperen Yildirim",
                  initials: "AY"
                },
                description: $description,
                customFields: [],
                relationships: [],
                dependencies: []
              },
              taskBenefits: {
                strategicThrust: {
                  id: "",
                  caption: ""
                },
                businessUnit: {
                  id: "",
                  caption: ""
                },
                benefitStatement: "",
                benefitValue: 0,
                benefitRealisationDate: "",
                benefitOwner: {
                  uname: "",
                  fullName: "",
                  initials: "",
                  picture: "",
                  email: "",
                  validTo: ""
                },
                estEffortDays: 0,
                estCost: 0,
                actualEffortDays: 0,
                actualCost: 0,
                complexity: {
                  id: "",
                  caption: ""
                },
                area: {
                  id: "",
                  caption: ""
                }
              },
              taskOneOff: {
                role: {
                  targetRoleId: "",
                  caption: "",
                  roleFunctionId: ""
                },
                oneOffDateTime: ""
              },
              testers: {
                allSystemsTesters: [
                  {
                    tester: {
                      uname: "AYILDIRIM",
                      fullName: "Alperen Yildirim",
                      initials: "AY"
                    },
                    systemId: "",
                    client: "",
                    smtpAddress: ""
                  }
                ],
                specificRoleTesters: [],
                specificTargetTesters: []
              },
              users: [],
              attachments: []
            }')

          echo "Create task payload:"
          echo "$TASK_PAYLOAD" | jq .

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "$AC_BASE_URL$AC_TASK_ENDPOINT?overrideWarning=false" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Cookie: wp-access-token=$AC_TOKEN" \
            -H "Authorization: Bearer $AC_TOKEN" \
            -d "$TASK_PAYLOAD")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Create Task HTTP Status: $STATUS"
          echo "Response body:"
          echo "$BODY" | jq . || echo "$BODY"

          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "❌ ActiveControl Business Task creation failed"
            exit 1
          fi

          TASK_ID=$(echo "$BODY" | jq -r '.taskId // empty')

          if [[ -z "$TASK_ID" || "$TASK_ID" == "null" ]]; then
            echo "⚠️ Task create call succeeded but no taskId found"
          else
            echo "✅ ActiveControl Business Task created"
            echo "Task ID: $TASK_ID"
          fi

          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          echo "## ActiveControl Business Task Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ ActiveControl login successful" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Business Task create call completed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: \`${{ inputs.package_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`${{ inputs.source_env }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`${{ inputs.target_env }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Git Commit: \`${{ steps.resolve_commit.outputs.git_commit }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Task ID: \`${{ steps.create_task.outputs.task_id }}\`" >> "$GITHUB_STEP_SUMMARY"
